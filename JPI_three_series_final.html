const qLabels = quarterlyRaw.map(q => q.label);
const qQoQ    = quarterlyRaw.map(q => q.qoq);
const qYoY    = quarterlyRaw.map(q => q.yoy);
const n       = quarterlyRaw.length;
const JPI_MIN = 85, JPI_MAX = 175;
const firstTs = new Date(dailyRaw[0][0]).getTime();
const lastTs  = new Date(dailyRaw[dailyRaw.length-1][0]).getTime();

const combinedPlugin = {
  id: 'combinedPlugin',
  afterDatasetsDraw(chart) {
    const { ctx, chartArea: { left, right, top, bottom } } = chart;
    const width = right - left, height = bottom - top;
    const barW  = width / n;
    ctx.save();

    // YoY line
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(17,17,17,0.85)';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    for (let i = 0; i < n; i++) {
      const px = left + (i + 0.5) * barW;
      const py = chart.scales.y.getPixelForValue(qYoY[i]);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // YoY dots
    ctx.fillStyle = 'rgba(17,17,17,0.85)';
    for (let i = 0; i < n; i++) {
      const px = left + (i + 0.5) * barW;
      const py = chart.scales.y.getPixelForValue(qYoY[i]);
      ctx.beginPath(); ctx.arc(px, py, 3.5, 0, Math.PI * 2); ctx.fill();
    }

    // Data label: last YoY point
    const lastI = n - 1;
    const lastPx = left + (lastI + 0.5) * barW;
    const lastYoYPy = chart.scales.y.getPixelForValue(qYoY[lastI]);
    ctx.font = 'bold 11px Arial';
    ctx.fillStyle = '#111';
    ctx.textAlign = 'center';
    ctx.fillText(qYoY[lastI].toFixed(1) + '%', lastPx, lastYoYPy - 9);

    // Data label: last QoQ bar
    const lastQoQPy = chart.scales.y.getPixelForValue(qQoQ[lastI]);
    ctx.font = 'bold 11px Arial';
    ctx.fillStyle = '#B84A12';
    ctx.textAlign = 'center';
    ctx.fillText(qQoQ[lastI].toFixed(1) + '%', lastPx, lastQoQPy + 15);

    // Daily JPI dotted gray line
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(150,150,150,0.7)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 4]);
    ctx.lineJoin = 'round';
    let started = false;
    for (let i = 0; i < dailyRaw.length; i++) {
      const ts  = new Date(dailyRaw[i][0]).getTime();
      const jpi = dailyRaw[i][1];
      const px  = left + (ts - firstTs) / (lastTs - firstTs) * width;
      const py  = top  + (JPI_MAX - jpi) / (JPI_MAX - JPI_MIN) * height;
      if (!started) { ctx.moveTo(px, py); started = true; }
      else          { ctx.lineTo(px, py); }
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Zero line
    const y0 = chart.scales.y.getPixelForValue(0);
    ctx.beginPath();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.2;
    ctx.moveTo(left, y0); ctx.lineTo(right, y0);
    ctx.stroke();
    ctx.restore();
  }
};

const jpiAxisPlugin = {
  id: 'jpiAxis',
  afterDraw(chart) {
    const { ctx, chartArea: { right, top, bottom } } = chart;
    const height = bottom - top;
    const ticks = [90,100,110,120,130,140,150,160,170];
    ctx.save();
    ctx.font = '11px Arial';
    ctx.fillStyle = '#999';
    ctx.textAlign = 'left';
    ticks.forEach(v => {
      if (v < JPI_MIN || v > JPI_MAX) return;
      const py = top + (JPI_MAX - v) / (JPI_MAX - JPI_MIN) * height;
      ctx.fillText(v, right + 6, py + 3);
    });
    ctx.save();
    ctx.translate(right + 44, (top + bottom) / 2);
    ctx.rotate(Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.font = '12px Arial';
    ctx.fillStyle = '#999';
    ctx.fillText('JPI Level (daily)', 0, 0);
    ctx.restore();
    ctx.restore();
  }
};

  }]},
  options: {
    responsive: true, maintainAspectRatio: false,
    layout: { padding: { right: 65 } },

      legend: { display: false },
      tooltip: {
        callbacks: {
          title(items) { return quarterlyRaw[items[0].dataIndex].label; },

          afterBody(items) {

            return [`YoY: ${q.yoy.toFixed(2)}%`, `Quarter-end JPI: ${q.jpi.toFixed(2)}`];
          }
        },
        backgroundColor:'rgba(15,23,42,0.92)', titleColor:'#94a3b8',
        bodyColor:'#e2e8f0', padding:10, cornerRadius:5
      }
    },
    scales: {
      x: { type:'category', grid:{color:'rgba(0,0,0,0.04)'},
           ticks:{font:{size:11,family:'Arial'},color:'#555',maxRotation:45} },
      y: { position:'left', min:-24, max:4,
           title:{display:true,text:'% Change',font:{size:12},color:'#444'},
           grid:{color:'rgba(0,0,0,0.06)'},
           ticks:{stepSize:4, callback:v=>v+'%',font:{size:11},color:'#555'} }
    }

});
